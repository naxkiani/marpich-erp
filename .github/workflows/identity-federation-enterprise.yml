name: Marpich Identity Federation Enterprise Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/contexts/identity_federation/**"
      - "backend/contexts/identity_risk/**"
      - "infrastructure/**"
      - ".github/workflows/identity-federation-enterprise.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: marpich/marpich-backend

jobs:
  test-federation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Identity federation unit & API tests
        run: python -m pytest contexts/identity_federation/tests/ -q

  security-scan:
    runs-on: ubuntu-latest
    needs: test-federation
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (federation)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend/contexts/identity_federation
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: backend/contexts/identity_federation
          format: spdx-json
          output-file: federation-sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: federation-sbom
          path: federation-sbom.spdx.json

  license-scan:
    runs-on: ubuntu-latest
    needs: test-federation
    steps:
      - uses: actions/checkout@v4
      - name: Dependency license scan
        run: |
          pip install pip-licenses
          pip-licenses --from=mixed --format=json --output-file=federation-licenses.json || true

  build-image:
    runs-on: ubuntu-latest
    needs: [test-federation, security-scan]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: backend
          file: infrastructure/docker/images/backend.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:7.0.0
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push' || github.event.inputs.environment == 'staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Helm lint
        run: helm lint infrastructure/kubernetes/helm/marpich-iam
      - name: Deploy via Helm
        run: |
          helm upgrade --install marpich-iam infrastructure/kubernetes/helm/marpich-iam \
            --namespace marpich --create-namespace \
            --set image.tag=sha-${{ github.sha }} \
            --set featureFlags.federationEnabled=true \
            --wait --timeout 10m
      - name: Smoke federation metrics
        run: |
          kubectl -n marpich port-forward svc/marpich-iam 8000:8000 &
          sleep 3
          curl -fsS http://127.0.0.1:8000/api/v1/federation/metrics

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event.inputs.environment == 'production'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Canary deploy (5% traffic)
        run: |
          helm upgrade --install marpich-iam infrastructure/kubernetes/helm/marpich-iam \
            --namespace marpich \
            -f infrastructure/kubernetes/helm/marpich-iam/values-production.yaml \
            --set image.tag=sha-${{ github.sha }} \
            --set canary.enabled=true \
            --set canary.weight=5 \
            --wait --timeout 15m
      - name: Rollback on health failure
        if: failure()
        run: |
          helm rollback marpich-iam 0 --namespace marpich || true
