# Marpich Financial Kernel — Chart of Accounts Templates
# See docs/architecture/ENTERPRISE_FINANCIAL_KERNEL.md

version: 1

account_types:
  - asset
  - liability
  - equity
  - revenue
  - expense
  - contra_asset
  - contra_liability

templates:
  coa.education:
    industries: [university, school]
    segments:
      - code: "1000"
        name: Assets
        children:
          - { code: "1100", name: Cash and Equivalents, type: asset }
          - { code: "1200", name: Accounts Receivable, type: asset }
          - { code: "1300", name: Grants Receivable, type: asset }
      - code: "2000"
        name: Liabilities
        children:
          - { code: "2100", name: Accounts Payable, type: liability }
          - { code: "2200", name: Student Deposits, type: liability }
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Tuition Revenue, type: revenue }
          - { code: "4200", name: Grant Revenue, type: revenue }
      - code: "5000"
        name: Expenses
        children:
          - { code: "5100", name: Faculty Salaries, type: expense }
          - { code: "5200", name: Facilities, type: expense }

  coa.healthcare:
    industries: [hospital, clinic, laboratory]
    segments:
      - code: "1000"
        name: Assets
        children:
          - { code: "1100", name: Cash, type: asset }
          - { code: "1200", name: Patient Receivables, type: asset }
          - { code: "1300", name: Insurance Receivables, type: asset }
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Patient Service Revenue, type: revenue }
          - { code: "4200", name: Lab Revenue, type: revenue }
      - code: "5000"
        name: Expenses
        children:
          - { code: "5100", name: Clinical Staff, type: expense }
          - { code: "5200", name: Medical Supplies, type: expense }

  coa.banking:
    industries: [bank, microfinance]
    segments:
      - code: "1000"
        name: Assets
        children:
          - { code: "1100", name: Cash and Reserves, type: asset }
          - { code: "1200", name: Loans Receivable, type: asset }
      - code: "2000"
        name: Liabilities
        children:
          - { code: "2100", name: Customer Deposits, type: liability }
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Interest Income, type: revenue }
          - { code: "4200", name: Fee Income, type: revenue }

  coa.islamic_banking:
    industries: [islamic_bank]
    segments:
      - code: "1000"
        name: Assets
        children:
          - { code: "1200", name: Murabaha Receivables, type: asset }
          - { code: "1210", name: Ijara Assets, type: asset }
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Profit from Murabaha, type: revenue }
          - { code: "4110", name: Ijara Rental Income, type: revenue }

  coa.forex:
    industries: [currency_exchange]
    segments:
      - code: "1100"
        name: Cash Positions
        children:
          - { code: "1110", name: Vault Cash USD, type: asset }
          - { code: "1120", name: Vault Cash EUR, type: asset }
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: FX Spread Revenue, type: revenue }

  coa.retail:
    industries: [retail, pos]
    segments:
      - code: "1100"
        name: Cash
        children:
          - { code: "1110", name: POS Cash Drawer, type: asset }
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Sales Revenue, type: revenue }
      - code: "5000"
        name: Expenses
        children:
          - { code: "5100", name: Cost of Goods Sold, type: expense }

  coa.government:
    industries: [government]
    segments:
      - code: "1000"
        name: Assets
        children:
          - { code: "1100", name: Treasury Cash, type: asset }
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Tax Revenue, type: revenue }
          - { code: "4200", name: Grant Revenue, type: revenue }

  coa.ngo:
    industries: [ngo]
    segments:
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Donations, type: revenue }
          - { code: "4200", name: Program Grants, type: revenue }

  coa.hospitality:
    industries: [hotel, restaurant]
    segments:
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Room Revenue, type: revenue }
          - { code: "4110", name: F&B Revenue, type: revenue }

  coa.real_estate:
    industries: [real_estate]
    segments:
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Rental Income, type: revenue }
      - code: "5000"
        name: Expenses
        children:
          - { code: "5100", name: Property Maintenance, type: expense }

  coa.construction:
    industries: [construction]
    segments:
      - code: "1200"
        name: Work in Progress
        children:
          - { code: "1210", name: WIP Materials, type: asset }
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Contract Revenue, type: revenue }

  coa.manufacturing:
    industries: [manufacturing]
    segments:
      - code: "1300"
        name: Inventory
        children:
          - { code: "1310", name: Raw Materials, type: asset }
          - { code: "1320", name: Finished Goods, type: asset }
      - code: "5000"
        name: Expenses
        children:
          - { code: "5100", name: Manufacturing Overhead, type: expense }

  coa.professional_services:
    industries: [accounting_firm]
    segments:
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Audit Fees, type: revenue }
          - { code: "4200", name: Advisory Fees, type: revenue }

  coa.tax_services:
    industries: [tax_consulting]
    segments:
      - code: "4000"
        name: Revenue
        children:
          - { code: "4100", name: Tax Preparation Fees, type: revenue }

default_dimensions:
  cost_center_required_for_expense: true
  profit_center_required_for_revenue: false
