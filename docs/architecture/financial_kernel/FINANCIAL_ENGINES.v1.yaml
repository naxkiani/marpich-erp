# Marpich Financial Kernel — Engine Catalog
# See docs/architecture/ENTERPRISE_FINANCIAL_KERNEL.md

version: 1

law:
  single_financial_foundation: true
  duplicate_financial_logic_forbidden: true
  every_module_calls_kernel: true
  not_an_accounting_module: true

engines:
  general_ledger:
    id: gl
    owner: financial_kernel
    capabilities: [trial_balance, period_close, balance_inquiry]
    api_prefix: /ledger

  chart_of_accounts:
    id: coa
    owner: financial_kernel
    capabilities: [account_hierarchy, industry_templates, account_types]
    account_types: [asset, liability, equity, revenue, expense, contra]

  cost_centers:
    id: cost_center
    owner: financial_kernel
    capabilities:
      - department
      - project
      - branch
      - faculty
      - hospital_ward
      - construction_site
      - warehouse
      - business_unit
      - profit_center
      - budget_allocation
      - expense_allocation
      - revenue_allocation
      - split_allocation
      - profitability_analysis
    api_prefix: /cost-centers
    publishes:
      - financial_kernel.cost_center.created
      - financial_kernel.profit_center.created
      - financial_kernel.allocation.created

  profit_centers:
    id: profit_center
    owner: financial_kernel
    capabilities: [dimension_assignment, revenue_attribution]
    satellite: cost_centers

  budget:
    id: budget
    owner: financial_kernel
    capabilities: [budget_vs_actual, threshold_alerts, approval_workflow]
    subscribes: [financial_kernel.journal.posted]

  journal:
    id: journal
    owner: financial_kernel
    capabilities:
      - double_entry
      - idempotent_posting
      - validation
      - reversal
      - enterprise_types
      - approval_workflow
      - digital_signature
      - ai_review
      - batch_posting
      - rollback
      - locking
      - versioning
    journal_types:
      - general
      - cash
      - bank
      - purchase
      - sales
      - inventory
      - payroll
      - tax
      - adjustment
      - opening
      - closing
      - reversing
      - recurring
      - foreign_currency
      - intercompany
    api_prefix: /journals
    catalog: financial_kernel/JOURNAL_CATALOG.yaml
    publishes: [financial_kernel.journal.posted]

  voucher:
    id: voucher
    owner: financial_kernel
    capabilities: [grouped_lines, draft, approve, post]
    workflow_required: true
    publishes: [financial_kernel.voucher.approved]

  payment:
    id: payment
    owner: financial_kernel
    capabilities:
      - initiate
      - settle
      - reconcile
      - refund
      - chargeback
      - split
      - partial
      - installments
      - advance
      - auto_allocation
      - payment_matching
    api_prefix: /payments
    publishes:
      - financial_kernel.payment.settled
      - financial_kernel.payment.allocated
      - financial_kernel.payment.refunded
      - financial_kernel.payment.chargeback
      - financial_kernel.payment.reconciled
    delegates_connector: integration.payment_gateway

  financial_documents:
    id: financial_documents
    owner: financial_kernel
    capabilities:
      - invoice
      - bill
      - voucher
      - receipt
      - payment_order
      - purchase_invoice
      - sales_invoice
      - credit_note
      - debit_note
      - journal_voucher
      - cash_voucher
      - bank_voucher
      - pdf_generation
      - digital_signature
      - qr_verification
      - versioning
      - approval_workflow
    api_prefix: /financial-documents
    publishes:
      - financial_kernel.document.created
      - financial_kernel.document.version.created
      - financial_kernel.document.approval.requested
      - financial_kernel.document.approved
      - financial_kernel.document.signed
      - financial_kernel.document.issued
    delegates_workflow: workflow_engine

  currency:
    id: currency
    owner: financial_kernel
    capabilities:
      - convert
      - multi_currency_amounts
      - base_currency_reporting
      - rate_snapshots
      - revaluation
      - gain_loss
      - exchange_history
      - auto_update
    api_prefix: /currency
    satellite: currency_exchange

  exchange_rates:
    id: exchange_rate
    owner: financial_kernel
    capabilities: [rate_tables, effective_dates, rate_sources]
    satellite: currency_exchange

  tax:
    id: tax
    owner: financial_kernel
    capabilities: [calculate, accrue, facade]
    satellite: tax
    rule: single_tax_owner

  treasury:
    id: treasury
    owner: treasury
    kernel_satellite: true
    gl_bridge: treasury/TREASURY_GL_BRIDGE.md
    catalog: treasury/TREASURY_CATALOG.yaml
    adr: 073-enterprise-treasury-platform
    law: treasury_manages_liquidity_kernel_owns_gl
    capabilities:
      - bank_accounts
      - cash_pools
      - liquidity_management
      - treasury_operations
      - financial_risk
      - investments
      - borrowing
      - funding
      - cash_forecasting
      - treasury_dashboard
      - treasury_analytics
      - treasury_ai_assistant
    - gl_auto_posting
    - enterprise_bank_accounts
    - enterprise_cash_management
    - treasury_transaction_engine
    - enterprise_liquidity_engine
    - enterprise_cash_forecast
    - enterprise_bank_reconciliation
    - enterprise_cash_reconciliation
    - enterprise_investment_management
    - enterprise_treasury_risk_platform
    - multi_currency_treasury
    - enterprise_treasury_workflow
    - enterprise_treasury_security
    - treasury_analytics_platform
  api_prefix: /treasury
    satellite: false
    not_pos: true

  banking_platform:
    id: banking
    owner: banking
    type: industry_extension
    capabilities:
      - customer_kyc
      - deposits
      - lending
      - cards
      - transfers
      - branch_banking
      - agency_banking
      - retail_banking
      - corporate_banking
      - microfinance
      - digital_banking
      - islamic_banking_compose
    api_prefix: /banking
    delegates_to:
      - general_ledger
      - payment
      - currency
      - financial_workflow
      - financial_security
      - financial_audit
      - policy_engine
    satellite: false

  cash_management:
    id: cash
    owner: financial_kernel
    deprecated_by: treasury
    capabilities: [bank_accounts, cash_flow, reconciliation]

  financial_workflow:
    id: financial_workflow
    owner: financial_kernel
    capabilities:
      - approval
      - payment
      - purchase
      - expense
      - transfer
      - budget
      - invoice
      - payroll
      - tax
      - treasury
      - sla
      - escalation
      - ai_recommendation
      - audit
      - history
      - digital_signature
    api_prefix: /workflows
    publishes:
      - financial_kernel.workflow.started
      - financial_kernel.workflow.approved
      - financial_kernel.workflow.rejected
      - financial_kernel.workflow.escalated
      - financial_kernel.workflow.signed
    delegates: workflow_engine

  financial_security:
    id: financial_security
    owner: financial_kernel
    capabilities:
      - maker_checker
      - four_eyes
      - dual_approval
      - digital_signature
      - audit_trail
      - transaction_locking
      - period_closing
      - fiscal_year_closing
      - rbac
      - abac
      - encryption
      - tamper_detection
    api_prefix: /security
    law: no_modification_without_audit
    publishes:
      - financial_kernel.security.maker_checker.submitted
      - financial_kernel.security.maker_checker.approved
      - financial_kernel.security.transaction.locked
      - financial_kernel.security.period.closed
      - financial_kernel.security.audit.recorded
      - financial_kernel.security.tamper.detected
    delegates_audit: audit_platform

  financial_reporting:
    id: reporting
    owner: financial_kernel
    capabilities: [profit_loss, balance_sheet, cash_flow, custom_reports]

  financial_analytics:
    id: analytics
    owner: financial_kernel
    capabilities: [kpis, trends, drill_down, dashboard]

  audit:
    id: audit
    owner: financial_kernel
    delegates: audit_platform
    audit_every_posting: true

  compliance:
    id: compliance
    owner: financial_kernel
    delegates: compliance_framework
    controls: [sox_segregation, budget_violation, period_close_checklist]

  ai_financial_assistant:
    id: ai_financial
    owner: financial_kernel
    delegates: ai_platform
    surface: ai.financial.copilot
    autonomous_posting_forbidden: true
    capabilities:
      - fraud_detection
      - cash_flow_prediction
      - budget_forecast
      - expense_analysis
      - revenue_prediction
      - financial_summary
      - risk_analysis
      - recommendation
      - invoice_classification
      - document_ocr
      - financial_chatbot
      - dashboard
      - cfo_assistant
    api_prefix: /financial-kernel/financial-ai

permissions:
  financial_kernel.accounts.read: View chart of accounts
  financial_kernel.accounts.write: Manage accounts
  financial_kernel.journals.post: Post journal entries
  financial_kernel.journals.read: View journals
  financial_kernel.vouchers.write: Create vouchers
  financial_kernel.vouchers.approve: Approve vouchers
  financial_kernel.payments.read: View payments
  financial_kernel.payments.write: Initiate and manage payments
  financial_kernel.payments.reconcile: Payment reconciliation
  financial_kernel.documents.read: View financial documents
  financial_kernel.documents.write: Create and update financial documents
  financial_kernel.documents.approve: Approve financial documents
  financial_kernel.documents.sign: Sign financial documents
  financial_kernel.documents.issue: Issue financial documents
  financial_kernel.cost_centers.read: View cost centers and allocations
  financial_kernel.cost_centers.write: Create cost and profit centers
  financial_kernel.cost_centers.allocate: Create and split allocations
  financial_kernel.cost_centers.analyze: Profitability analysis
  financial_kernel.workflows.read: View financial workflows
  financial_kernel.workflows.write: Start financial workflows
  financial_kernel.workflows.approve: Approve, reject, complete workflows
  financial_kernel.workflows.escalate: Escalate workflows
  financial_kernel.workflows.sign: Sign financial workflows
  financial_kernel.security.read: View financial security controls
  financial_kernel.security.write: Submit maker-checker and guarded modifications
  financial_kernel.security.approve: Approve security requests and period close
  financial_kernel.security.lock: Transaction locking
  financial_kernel.security.close: Request period/fiscal year close
  financial_kernel.security.audit: Audit trail and tamper verification
  financial_kernel.security.admin: Manage security policies
  financial_kernel.ai.read: View AI capabilities and jobs
  financial_kernel.ai.analyze: Run financial AI analysis
  financial_kernel.ai.chat: Financial chatbot and CFO assistant
  financial_kernel.ai.dashboard: AI financial dashboard
  financial_kernel.ledger.read: Trial balance and GL inquiry
  financial_kernel.reports.read: Financial reports
  financial_kernel.analytics.read: Financial analytics dashboard
  financial_kernel.periods.close: Close fiscal periods
  financial_kernel.budgets.read: View budgets
  financial_kernel.budgets.write: Manage budgets
  financial_kernel.currency.read: View exchange rates
  financial_kernel.currency.write: Manage rates and revaluation
  financial_kernel.currency.convert: Convert amounts
  financial_kernel.tax.calculate: Calculate tax
  financial_kernel.cash.read: Cash management views
  financial_kernel.dimensions.read: View financial dimensions and validate journal lines
  financial_kernel.dimensions.write: Manage dimension master data

posting_rules:
  double_entry_required: true
  open_period_required: true
  idempotency_key_required: true
  correlation_id_required: true
  balanced_lines_required: true

posting_rule_engine:
  id: posting_rules
  owner: financial_kernel
  law: business_modules_never_post_directly
  api_prefix: /posting-rules
  catalog: financial_kernel/POSTING_RULE_CATALOG.yaml
  capabilities:
    - rule_builder
    - preview
    - execute_posting
    - tenant_overrides
  platform_rules:
    - purchase
    - sales
    - payroll
    - inventory
    - hospital_billing
    - university_tuition
    - construction_cost
    - bank_deposit
    - exchange_transaction
    - tax
    - asset
    - loan
    - insurance

fiscal_calendar_engine:
  id: fiscal_calendar
  owner: financial_kernel
  api_prefix: /fiscal-calendar
  catalog: financial_kernel/FISCAL_CALENDAR_CATALOG.yaml
  capabilities:
    - unlimited_fiscal_years
    - multiple_calendars
    - monthly_closing
    - quarter_closing
    - year_closing
    - adjustment_period
    - soft_close
    - hard_close
    - reopen_period
    - approval_required
    - audit_log
    - financial_lock
    - closing_assistant
    - ai_closing_checklist

account_hierarchy_engine:
  id: account_hierarchy
  owner: financial_kernel
  api_prefix: /account-hierarchy
  catalog: financial_kernel/ACCOUNT_HIERARCHY_CATALOG.yaml
  capabilities:
    - unlimited_tree_levels
    - drag_and_drop
    - tree_versioning
    - multiple_trees
    - industry_templates
    - country_templates
    - ai_optimization
    - search
    - filters
    - bulk_import
    - bulk_export
    - automatic_validation
    - duplicate_detection
    - parent_child_integrity
    - visual_account_tree

subledger_engine:
  id: subledger
  owner: financial_kernel
  api_prefix: /subledgers
  catalog: financial_kernel/SUBLEDGER_CATALOG.yaml
  law: subledgers_never_post_directly
  capabilities:
    - accounts_receivable
    - accounts_payable
    - inventory
    - payroll
    - treasury
    - assets
    - loans
    - projects
    - students
    - patients
    - taxes
    - currency_exchange
    - automatic_gl_posting
    - idempotent_entries
    - reconciliation_engine

reconciliation_engine:
  id: reconciliation
  owner: financial_kernel
  api_prefix: /reconciliation
  catalog: financial_kernel/RECONCILIATION_CATALOG.yaml
  capabilities:
    - bank_reconciliation
    - cash_reconciliation
    - intercompany_reconciliation
    - subledger_reconciliation
    - general_ledger_reconciliation
    - automatic_matching
    - manual_matching
    - exception_queue
    - ai_suggestions
    - difference_analysis
    - reconciliation_reports
    - approval_workflow
    - audit_history

financial_dimensions_engine:
  id: financial_dimensions
  owner: financial_kernel
  api_prefix: /dimensions
  catalog: financial_kernel/DIMENSION_CATALOG.yaml
  law: unlimited_dimensions_per_journal_line
  capabilities:
    - company
    - branch
    - department
    - project
    - cost_center
    - profit_center
    - fund
    - grant
    - faculty
    - hospital
    - ward
    - construction_site
    - warehouse
    - country
    - currency
    - business_unit
    - unlimited_dimensions_per_line
    - master_data_registry
    - post_time_validation
    - legacy_field_merge
    - audit_history

financial_validation_engine:
  id: financial_validation
  owner: financial_kernel
  api_prefix: /validation
  catalog: financial_kernel/VALIDATION_CATALOG.yaml
  law: reject_invalid_before_post
  capabilities:
    - balanced_journals
    - posting_permissions
    - fiscal_period
    - currency
    - tax
    - budget
    - account_status
    - duplicate_posting
    - approval_status
    - dimension_rules
    - business_rules
    - validation_report
    - reject_invalid_transactions
    - audit_history

financial_audit_platform:
  id: financial_audit
  owner: financial_kernel
  api_prefix: /audit
  catalog: financial_kernel/FINANCIAL_AUDIT_CATALOG.yaml
  law: immutable_audit_no_deletion
  capabilities:
    - who_created
    - who_approved
    - who_posted
    - who_modified
    - who_reversed
    - timestamp_tracking
    - device_tracking
    - ip_tracking
    - tenant_tracking
    - organization_tracking
    - reason_tracking
    - immutable_audit_history
    - tamper_evident_chain
    - deletion_forbidden
    - lifecycle_report

gl_ai_assistant:
  id: gl_ai
  owner: financial_kernel
  api_prefix: /gl-ai
  catalog: financial_kernel/GL_AI_CATALOG.yaml
  law: ai_suggests_humans_approve
  capabilities:
    - posting_suggestions
    - account_suggestions
    - duplicate_detection
    - fraud_detection
    - closing_assistant
    - anomaly_detection
    - financial_insights
    - automatic_classification
    - forecasting
    - journal_explanation
    - variance_analysis
    - ai_cfo_dashboard
    - explainable_recommendations
