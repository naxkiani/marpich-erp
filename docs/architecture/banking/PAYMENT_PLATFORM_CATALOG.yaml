# Banking Payment Platform — API Catalog
# See docs/adr/093-banking-payment-platform.md

version: 1
owner: banking
module: payment_platform
api_prefix: /api/v1/banking/payments
adr: docs/adr/093-banking-payment-platform.md

transfer_types:
  - internal
  - inter_branch
  - bank_to_bank
  - bulk
  - bill_payment
  - government_payment
  - salary_transfer
  - merchant_payment
  - qr_payment
  - real_time

capabilities:
  - scheduled_transfer
  - standing_orders
  - transfer_limits
  - approval_workflow
  - fraud_checks
  - automatic_gl_posting
  - audit_trail

policy_domain: bank
policy_keys:
  - payment.transfer.daily_limit
  - payment.transfer.single_limit
  - payment.approval.required_level
  - payment.fraud.threshold
  - payment.fraud.velocity
  - payment.scheduled.execution
  - payment.standing_order.rules
  - payment.real_time.settlement
  - payment.government.routing
  - payment.salary.batch

events_published:
  - banking.transfer.posted
  - banking.transaction.posted
  - banking.payment.fraud.flagged

posting_rules:
  - bank_transfer

permissions:
  - banking.transfers.read
  - banking.transfers.write
  - banking.transfers.execute

endpoints:
  - GET /catalog
  - GET /policy-keys
  - GET /dashboard
  - POST /beneficiaries
  - POST /transfers
  - GET /transfers
  - GET /transfers/{transfer_id}
  - POST /transfers/{transfer_id}/submit
  - POST /transfers/{transfer_id}/approve
  - POST /transfers/{transfer_id}/schedule
  - POST /transfers/{transfer_id}/execute
  - POST /transfers/{transfer_id}/fraud-check
  - POST /bulk
  - POST /standing-orders
  - GET /transfers/{transfer_id}/audit
