# Branch Banking Platform — API Catalog
# See docs/adr/095-banking-branch-platform.md

version: 1
owner: banking
module: branch_banking
api_prefix: /api/v1/banking/branches
adr: docs/adr/095-banking-branch-platform.md

office_types:
  - head_office
  - regional_office
  - branch
  - sub_branch

extension_types:
  - cash_counter
  - atm_extension
  - self_service_kiosk_extension

capabilities:
  - branch_opening
  - branch_closing
  - vault_management
  - cash_limits
  - employee_assignment
  - branch_kpis
  - branch_analytics

policy_domain: bank
policy_keys:
  - branch.cash.drawer.limit
  - branch.large_cash.transaction_threshold
  - branch.opening.checklist
  - branch.closing.checklist
  - branch.vault.limit
  - branch.cash.counter.limit
  - branch.kpi.targets
  - branch.employee.max_assignments

events_published:
  - banking.branch.opened
  - banking.branch.closed
  - banking.vault.movement
  - banking.branch.kpi.recorded

permissions:
  - banking.branch.read
  - banking.branch.write
  - banking.branch.operate
  - banking.branch.admin

endpoints:
  - GET /catalog
  - GET /policy-keys
  - GET /dashboard
  - GET /analytics
  - POST /offices
  - GET /offices
  - GET /offices/{office_id}
  - POST /offices/{office_id}/extensions
  - POST /offices/{office_id}/open
  - POST /offices/{office_id}/close
  - POST /offices/{office_id}/vault/movements
  - POST /offices/{office_id}/cash-limits
  - GET /offices/{office_id}/cash-limits
  - POST /offices/{office_id}/assignments
  - GET /offices/{office_id}/assignments
  - POST /offices/{office_id}/kpis
  - GET /offices/{office_id}/kpis
  - GET /offices/{office_id}/audit
