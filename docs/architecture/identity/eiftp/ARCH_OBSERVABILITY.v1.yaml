version: "1.0"
prompt_id: P200-B2

observability:
  logs: structured_logging_request_tenant_correlation
  metrics: federation_protocol_trust_ai_metrics
  traces: otel_spans_on_protocol_and_trust_eval
  health: /health_via_gateway
