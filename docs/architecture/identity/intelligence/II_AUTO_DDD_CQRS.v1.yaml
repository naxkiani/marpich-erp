# P207-D — Autonomous ops DDD / CQRS
version: "1.0"
prompt_id: P207-D
adr: "319"
sor: identity_intelligence

logical_bounded_contexts:
  - autonomous_operations_engine
  - decision_engine
  - workflow_orchestration
  - self_healing
  - agent_orchestration
  - learning_feedback
  - execution_security

aggregates:
  - AutonomousOperationRun
  - AutonomousDecisionCase
  - AutonomousWorkflowInstance
  - SelfHealingRemediation
  - AgentOrchestrationRequest
  - ActionApprovalGate
  - LearningFeedbackRecord

commands:
  - AnalyzeIdentityEvent
  - EvaluateRisk
  - GenerateAction
  - ApproveAction
  - ExecuteAction
  - ValidateResult

queries:
  - GetAutonomousRun
  - GetDecisionCase
  - GetWorkflowStatus
  - GetRemediation
  - GetApprovalGate
  - GetLearningMetrics

