# P209 — Cryptographic Trust validation gates
version: "1.0"
prompt_id: P209
adr: "345"
sor: secrets
api_prefix: /api/v1/secrets

reject_if:
  - secrets_stored_in_plaintext
  - keys_outside_governed_lifecycle
  - certificates_manually_managed
  - hsm_integration_absent
  - cryptographic_agility_unsupported
  - workload_identities_unverifiable
  - trust_relationships_unauditable
  - invents_sibling_vault_pki_kms_bc

nfr:
  availability: ">= 99.99%"
  millions_of_certificates: true
  millions_of_secrets: true
  millions_of_keys: true
  billions_of_crypto_ops: true
  multi_region: true
  automatic_failover: true

production_readiness_verdict: ENTERPRISE_GRADE
foundation_validator: contexts.secrets.domain.services.secrets_foundation
