# P209-C — Domain validation gates
version: "1.0"
prompt_id: P209-C
adr: "348"
sor: secrets
api_prefix: /api/v1/secrets/domain

reject_if:
  - domain_boundaries_unclear
  - pki_and_kms_responsibilities_mixed
  - secrets_unmanaged
  - trust_relationships_not_modeled
  - domain_events_absent
  - aggregates_violate_ownership_rules
  - cryptographic_lifecycle_incomplete
  - invents_sibling_vault_pki_kms_bc

production_readiness_verdict: ENTERPRISE_GRADE
foundation_validator: contexts.secrets.domain.services.secrets_domain_foundation
