# P209-F — KMS validation gates
version: "1.0"
prompt_id: P209-F
adr: "351"
sor: secrets
api_prefix: /api/v1/secrets/kms

reject_if:
  - keys_stored_without_protection
  - hsm_capability_unavailable
  - key_lifecycle_incomplete
  - key_ownership_unknown
