# P209-G — Vault / Secrets validation gates
version: "1.0"
prompt_id: P209-G
adr: "352"
sor: secrets
api_prefix: /api/v1/secrets/vault

reject_if:
  - secrets_stored_in_plaintext
  - hardcoded_credentials_exist
  - secret_lifecycle_incomplete
  - rotation_manual_only
  - secret_ownership_unknown
  - secret_access_unaudited
  - dynamic_credentials_unsupported
  - invents_sibling_vault_bc

production_readiness_verdict: ENTERPRISE_GRADE
foundation_validator: contexts.secrets.domain.services.secrets_vault_foundation
