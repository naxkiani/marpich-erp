# P209-E — CA / Trust Chain validation gates
version: "1.0"
prompt_id: P209-E
adr: "350"
sor: secrets
api_prefix: /api/v1/secrets/ca

reject_if:
  - root_ca_online_without_protection
  - ca_private_keys_lack_hsm_protection
  - trust_chains_cannot_be_validated
  - certificate_revocation_unavailable
  - certificate_ownership_unknown
  - ca_governance_undefined
  - audit_trail_incomplete
  - invents_sibling_ca_pki_bc

production_readiness_verdict: ENTERPRISE_GRADE
foundation_validator: contexts.secrets.domain.services.secrets_ca_foundation
