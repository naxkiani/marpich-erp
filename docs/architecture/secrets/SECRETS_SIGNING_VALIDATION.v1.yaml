# P209-J — Signing / Supply Chain validation gates
version: "1.0"
prompt_id: P209-J
adr: "355"
sor: secrets
api_prefix: /api/v1/secrets/signing

reject_if:
  - software_artifacts_are_unsigned
  - signing_keys_are_unmanaged
  - supply_chain_provenance_unavailable
  - sbom_verification_absent
  - deployment_trust_cannot_be_validated
  - artifact_ownership_unknown
  - signature_operations_unaudited
  - invents_sibling_signing_supply_chain_bc

production_readiness_verdict: ENTERPRISE_GRADE
foundation_validator: contexts.secrets.domain.services.secrets_signing_foundation
