# P209-I — Cryptography Services validation gates
version: "1.0"
prompt_id: P209-I
adr: "354"
sor: secrets
api_prefix: /api/v1/secrets/crypto

reject_if:
  - applications_implement_unmanaged_cryptography
  - encryption_operations_bypass_governance
  - keys_are_exposed
  - algorithms_are_uncontrolled
  - signatures_cannot_be_verified
  - cryptographic_operations_lack_audit_trails
  - invents_sibling_crypto_encryption_bc

production_readiness_verdict: ENTERPRISE_GRADE
foundation_validator: contexts.secrets.domain.services.secrets_crypto_foundation
