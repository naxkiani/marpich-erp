# P209-H — Workload Identity validation gates
version: "1.0"
prompt_id: P209-H
adr: "353"
sor: secrets
api_prefix: /api/v1/secrets/workload

reject_if:
  - workloads_lack_cryptographic_identity
  - static_credentials_required
  - mtls_cannot_be_enforced
  - certificate_rotation_manual
  - trust_domains_undefined
  - workload_identity_ownership_unknown
  - service_communication_unaudited
  - invents_sibling_workload_spiffe_bc

production_readiness_verdict: ENTERPRISE_GRADE
foundation_validator: contexts.secrets.domain.services.secrets_workload_foundation
