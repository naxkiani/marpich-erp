context: hospital
architecture_version: "1.0"
display_name: Hospital
type: industry
description: "Acute care — CAP-HLT-001 patient lifecycle (register, admit, encounter). Never merge with clinic."
capability_ids:
  - CAP-HLT-001
  - CAP-HLT-005
aggregates:
  - Patient
  - Admission
  - Encounter
publishes:
  - hospital.patient.registered
  - hospital.admission.registered
  - hospital.encounter.started
  - hospital.encounter.completed
subscribes:
  - identity.user.created
  - laboratory.result.available
schema: hospital
permissions:
  - hospital.patients.read
  - hospital.patients.write
  - hospital.admissions.read
  - hospital.admissions.write
  - hospital.encounters.read
  - hospital.encounters.write
  - hospital.lab_results.read
ai:
  surfaces:
    - insights
    - recommendations
    - summaries
    - search
    - assistant
    - automation
    - document_intelligence
    - voice_commands
    - chat
    - report_explanation
    - anomaly_detection
    - forecasting
    - optimization
    - predictions
  prompt_templates:
    - hospital.encounter.summary
    - hospital.admission.risk_flags
