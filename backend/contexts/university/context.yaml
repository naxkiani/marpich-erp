ai:
  surfaces:
    - insights
    - recommendations
    - summaries
    - search
    - assistant
    - automation
    - document_intelligence
    - voice_commands
    - chat
    - report_explanation
    - anomaly_detection
    - forecasting
    - optimization
    - predictions
  prompt_templates:
    - university.student.risk_summary
