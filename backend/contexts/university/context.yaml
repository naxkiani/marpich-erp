context: university
architecture_version: "1.0"
display_name: University
type: industry
description: "Higher education — CAP-EDU-001 student lifecycle (students, courses, grades)"
capability_ids:
  - CAP-EDU-001
aggregates:
  - Student
  - Course
  - Grade
publishes:
  - university.student.enrolled
  - university.course.offered
  - university.grade.posted
