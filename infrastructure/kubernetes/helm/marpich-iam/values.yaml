# Marpich IAM — default values (development)
global:
  environment: development
  region: eu-west-1

image:
  repository: ghcr.io/marpich/marpich-backend
  tag: "7.0.0"
  pullPolicy: IfNotPresent

replicaCount: 2

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8000
  metricsPort: 9090

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: auth.dev.marpich.io
      paths:
        - path: /api/v1/adaptive-auth
          pathType: Prefix
        - path: /api/v1/authentication
          pathType: Prefix
        - path: /api/v1/federation
          pathType: Prefix
        - path: /api/v1/identity/providers
          pathType: Prefix
        - path: /api/v1/identity/claims
          pathType: Prefix
        - path: /api/v1/identity/metadata
          pathType: Prefix
        - path: /api/v1/identity-twins
          pathType: Prefix
        - path: /api/v1/health
          pathType: Prefix
  tls:
    - secretName: marpich-iam-tls
      hosts:
        - auth.dev.marpich.io

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

canary:
  enabled: false
  weight: 10

blueGreen:
  enabled: false

env:
  MARPICH_APP_PROFILE: enterprise
  PERSISTENCE_BACKEND: postgres
  EVENT_BUS_MODE: outbox
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: marpich-iam
  MARPICH_RLS_ENABLED: "true"
  KAFKA_ENABLED: "true"

secrets:
  vault:
    enabled: true
    role: marpich-iam
    path: secret/data/marpich/iam
  externalSecrets:
    enabled: true
    refreshInterval: 1h

postgresql:
  enabled: false

redis:
  enabled: false

externalDatabase:
  host: postgres.marpich.svc.cluster.local
  port: 5432
  database: marpich_platform
  existingSecret: marpich-db-credentials
  existingSecretKey: database-url

externalRedis:
  host: redis.marpich.svc.cluster.local
  port: 6379

kafka:
  bootstrapServers: kafka.marpich.svc.cluster.local:9092
  topicPrefix: marpich

serviceMonitor:
  enabled: true
  interval: 15s
  scrapePath: /api/v1/adaptive-auth/metrics
  additionalEndpoints:
    - path: /api/v1/federation/metrics
      interval: 15s
    - path: /api/v1/federation/fabric/metrics
      interval: 30s
    - path: /api/v1/federation/intelligence/metrics
      interval: 30s
    - path: /api/v1/identity-twins/metrics
      interval: 15s

networkPolicy:
  enabled: true

featureFlags:
  adaptiveAuthEnabled: true
  aiScoringEnabled: true
  zeroTrustEnabled: true
  continuousAuthEnabled: true
  federationEnabled: true
  federationAiEnabled: true
  federationMeshEnabled: true
  emergencyFederationEnabled: false
  twinEnabled: true
  twinSyncEnabled: true
  twinIntelligenceEnabled: true

performance:
  authLatencyTargetMs: 150
  riskEvalTargetMs: 100
  aiInferenceTargetMs: 75
  federationLoginTargetMs: 200
  federationTokenTargetMs: 100
  federationJitTargetMs: 500
  twinSyncLagTargetSeconds: 30
  twinPredictionTargetMs: 2000
  twinGraphQueryTargetMs: 500

verticalPodAutoscaler:
  enabled: true
  updateMode: Auto

federationJobs:
  scimSync:
    enabled: true
    schedule: "*/15 * * * *"
  trustRevalidate:
    enabled: true
    schedule: "0 */6 * * *"

twinWorkers:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 50
    targetCPUUtilizationPercentage: 70

twinJobs:
  snapshot:
    enabled: true
    schedule: "0 */4 * * *"
  driftScan:
    enabled: true
    schedule: "*/30 * * * *"
  retention:
    enabled: true
    schedule: "0 3 * * *"
