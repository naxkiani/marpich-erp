{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "marpich-iam.fullname" . }}
  labels:
    {{- include "marpich-iam.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "marpich-iam.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: marpich-ingress
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 8200
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 4317
{{- end }}
