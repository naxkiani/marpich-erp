apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "marpich-iam.fullname" . }}
  labels:
    {{- include "marpich-iam.labels" . | nindent 4 }}
data:
  {{- range $key, $val := .Values.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  FEATURE_ADAPTIVE_AUTH: {{ .Values.featureFlags.adaptiveAuthEnabled | quote }}
  FEATURE_AI_SCORING: {{ .Values.featureFlags.aiScoringEnabled | quote }}
  FEATURE_ZERO_TRUST: {{ .Values.featureFlags.zeroTrustEnabled | quote }}
  FEATURE_CONTINUOUS_AUTH: {{ .Values.featureFlags.continuousAuthEnabled | quote }}
  FEATURE_FEDERATION: {{ .Values.featureFlags.federationEnabled | quote }}
  FEATURE_FEDERATION_AI: {{ .Values.featureFlags.federationAiEnabled | quote }}
  FEATURE_FEDERATION_MESH: {{ .Values.featureFlags.federationMeshEnabled | quote }}
  FEATURE_EMERGENCY_FEDERATION: {{ .Values.featureFlags.emergencyFederationEnabled | quote }}
  FEDERATION_LOGIN_TARGET_MS: {{ .Values.performance.federationLoginTargetMs | default 200 | quote }}
  FEDERATION_TOKEN_TARGET_MS: {{ .Values.performance.federationTokenTargetMs | default 100 | quote }}
  FEDERATION_JIT_TARGET_MS: {{ .Values.performance.federationJitTargetMs | default 500 | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrapServers | quote }}
  KAFKA_TOPIC_PREFIX: {{ .Values.kafka.topicPrefix | quote }}
