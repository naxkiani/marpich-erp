{{- if .Values.twinJobs.snapshot.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "marpich-iam.fullname" . }}-twin-snapshot
  labels:
    {{- include "marpich-iam.labels" . | nindent 4 }}
    app.kubernetes.io/component: digital-twin
spec:
  schedule: {{ .Values.twinJobs.snapshot.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: twin-snapshot
              image: curlimages/curl:8.5.0
              envFrom:
                - secretRef:
                    name: marpich-twin-job-credentials
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  curl -fsS -X POST \
                    -H "Content-Type: application/json" \
                    -H "X-Tenant-ID: ${X_TENANT_ID:-platform}" \
                    -H "Authorization: Bearer ${TWIN_JOB_TOKEN}" \
                    "http://{{ include "marpich-iam.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/api/v1/identity-twins/jobs/snapshot" \
                    -d '{"source":"cron","job_type":"snapshot"}'
{{- end }}
