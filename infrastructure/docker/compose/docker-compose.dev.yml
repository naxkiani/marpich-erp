# Marpich ERP — canonical local platform stack (Postgres, Redis, Kafka)
# Usage: docker compose -f infrastructure/docker/compose/docker-compose.dev.yml up -d
# Then: ./scripts/dev-up.sh  (waits + migrates)

services:
  postgres:
    image: postgres:16-alpine
    container_name: marpich-postgres
    environment:
      POSTGRES_USER: marpich
      POSTGRES_PASSWORD: marpich
      POSTGRES_DB: marpich_platform
    ports:
      - "5432:5432"
    volumes:
      - marpich_pg_data:/var/lib/postgresql/data
      - ../init-db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ../migrations/002_identity_full.sql:/docker-entrypoint-initdb.d/02_identity.sql:ro
      - ../migrations/003_contexts.sql:/docker-entrypoint-initdb.d/03_contexts.sql:ro
      - ../migrations/004_notifications.sql:/docker-entrypoint-initdb.d/04_notifications.sql:ro
      - ../migrations/005_settings.sql:/docker-entrypoint-initdb.d/05_settings.sql:ro
      - ../migrations/006_organization.sql:/docker-entrypoint-initdb.d/06_organization.sql:ro
      - ../migrations/007_audit.sql:/docker-entrypoint-initdb.d/07_audit.sql:ro
      - ../migrations/008_documents.sql:/docker-entrypoint-initdb.d/08_documents.sql:ro
      - ../migrations/009_workflow.sql:/docker-entrypoint-initdb.d/09_workflow.sql:ro
      - ../migrations/010_integration.sql:/docker-entrypoint-initdb.d/10_integration.sql:ro
      - ../migrations/011_media.sql:/docker-entrypoint-initdb.d/11_media.sql:ro
      - ../migrations/012_analytics.sql:/docker-entrypoint-initdb.d/12_analytics.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marpich -d marpich_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: marpich-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: marpich-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: marpich-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ../../observability/otel/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.51.0
    container_name: marpich-prometheus
    volumes:
      - ../../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../observability/prometheus/alerts:/etc/prometheus/alerts:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:10.4.0
    container_name: marpich-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: marpich
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  marpich_pg_data:
