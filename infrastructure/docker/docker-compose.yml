services:
  postgres:
    image: postgres:16-alpine
    container_name: marpich-postgres
    environment:
      POSTGRES_USER: marpich
      POSTGRES_PASSWORD: marpich
      POSTGRES_DB: marpich_platform
    ports:
      - "5432:5432"
    volumes:
      - marpich_pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./migrations/002_identity_full.sql:/docker-entrypoint-initdb.d/02_identity.sql
      - ./migrations/003_contexts.sql:/docker-entrypoint-initdb.d/03_contexts.sql
      - ./migrations/004_notifications.sql:/docker-entrypoint-initdb.d/04_notifications.sql
      - ./migrations/005_settings.sql:/docker-entrypoint-initdb.d/05_settings.sql
      - ./migrations/006_organization.sql:/docker-entrypoint-initdb.d/06_organization.sql
      - ./migrations/007_audit.sql:/docker-entrypoint-initdb.d/07_audit.sql
      - ./migrations/008_documents.sql:/docker-entrypoint-initdb.d/08_documents.sql
      - ./migrations/009_workflow.sql:/docker-entrypoint-initdb.d/09_workflow.sql
      - ./migrations/010_integration.sql:/docker-entrypoint-initdb.d/10_integration.sql
      - ./migrations/011_media.sql:/docker-entrypoint-initdb.d/11_media.sql
      - ./migrations/012_analytics.sql:/docker-entrypoint-initdb.d/12_analytics.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marpich"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marpich-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    container_name: marpich-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  marpich_pg_data:
