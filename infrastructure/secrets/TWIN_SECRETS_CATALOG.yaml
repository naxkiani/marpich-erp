# Marpich Digital Twin — secrets catalog (ADR-209)
# Secrets are never committed. Paths map to Vault / AWS SM / Azure KV / GCP SM.
apiVersion: marpich.io/v1
kind: SecretsCatalog
metadata:
  id: identity-digital-twin-secrets
  version: "1.0.0"
  adr: 209

providers:
  - hashicorp_vault
  - aws_secrets_manager
  - azure_key_vault
  - google_secret_manager

path_prefix: "marpich/${environment}/iam/twin"

secrets:
  - key: twin-job-token
    rotation_days: 30
    automatable: true
    purpose: CronJob / worker authenticated calls to twin APIs
  - key: database-url
    rotation_days: 30
    automatable: true
    note: Shared IAM DB URL or twin-dedicated role — External Secrets
  - key: kafka-credentials
    rotation_days: 60
    automatable: true
  - key: redis-credentials
    rotation_days: 60
    automatable: true
  - key: twin-encryption-key
    rotation_days: 180
    automatable: true
    purpose: Optional field-level encryption for sensitive facets
  - key: edge-sync-credentials
    rotation_days: 30
    automatable: true
    purpose: Edge nodes calling Integration / sync ingress

rotation:
  engine: external_secrets_plus_provider
  certificate_owner: cert_manager

law:
  - never_commit_secret_values
  - twin_bc_stores_refs_only
  - no_second_secrets_sor
